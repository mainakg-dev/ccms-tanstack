<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern computer institute management system for managing enrollments, courses, exams, centers, and more."
    />
    <title>CCMS - Computer Course Management System</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <script>
      // Theme initialization (runs before React to prevent FOUC)
      (function () {
        try {
          const stored = window.localStorage.getItem("theme");

          const mode =
            stored === "light" || stored === "dark" || stored === "auto"
              ? stored
              : "auto";

          const prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;

          const resolved =
            mode === "auto" ? (prefersDark ? "dark" : "light") : mode;

          const root = document.documentElement;

          root.classList.remove("light", "dark");
          root.classList.add(resolved);

          if (mode === "auto") {
            root.removeAttribute("data-theme");
          } else {
            root.setAttribute("data-theme", mode);
          }

          root.style.colorScheme = resolved;
        } catch (e) {
          // Ignore errors (e.g. localStorage unavailable)
        }
      })();
    </script>
  </head>
  <body
    class="font-sans antialiased wrap-anywhere selection:bg-[rgba(79,184,178,0.24)]"
  >
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
